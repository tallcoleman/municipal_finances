name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      db-test:
        image: postgres:17
        env:
          POSTGRES_USER: muni
          POSTGRES_PASSWORD: muni
          POSTGRES_DB: municipal_finances_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests
        run: uv run pytest --cov-report=json

      - name: Post coverage comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const coverage = JSON.parse(fs.readFileSync('coverage.json', 'utf8'));
            const total = coverage.totals.percent_covered_display;

            let body = `## Test Coverage: ${total}%\n\n`;

            const missingFiles = Object.entries(coverage.files)
              .filter(([, data]) => data.summary.percent_covered < 100)
              .map(([file, data]) => `| \`${file}\` | ${data.summary.percent_covered_display}% |`)
              .join('\n');

            if (missingFiles) {
              body += `| File | Coverage |\n|------|----------|\n${missingFiles}`;
            } else {
              body += 'All files at 100% coverage.';
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(
              c => c.user.type === 'Bot' && c.body.startsWith('## Test Coverage')
            );
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
